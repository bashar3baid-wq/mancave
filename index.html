م<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صالون الملك - حجز مواعيد</title>
    <!-- استيراد خط تجوال الأنيق -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #d4af37; /* ذهبي ملكي */
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }

        /* الهيدر */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #1e1e1e 0%, #111111 100%);
            border-bottom: 2px solid var(--accent-color);
        }

        .header .crown-icon {
            font-size: 40px;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-color);
        }

        .header p {
            color: var(--accent-color);
            font-size: 14px;
            margin-top: 5px;
            font-weight: 500;
        }

        .section-title {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 15px;
            border-right: 3px solid var(--accent-color);
            padding-right: 10px;
        }

        /* فورم الحجز */
        .booking-form {
            padding: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group input[type="text"], 
        .input-group input[type="time"], 
        .input-group select {
            width: 100%;
            padding: 12px;
            background-color: #252525;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            text-align: right;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--accent-color);
        }

        /* ستايل قائمة الخدمات متعددة الاختيار */
        .services-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .service-checkbox {
            display: flex;
            align-items: center;
            background-color: #252525;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #2e2e2e;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .service-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
            margin-left: 12px;
            cursor: pointer;
        }

        .service-details {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
        }

        .service-name {
            font-size: 15px;
            color: var(--text-color);
        }

        .service-price {
            color: var(--accent-color);
            font-weight: 700;
            font-size: 14px;
        }

        /* زر الحجز */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: #121212;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
            transition: transform 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- هيدر الصالون -->
    <div class="header">
        <div class="crown-icon">👑</div>
        <h1>صالون الملك</h1>
        <p>العناية الفاخرة التي تستحقها</p>
    </div>

    <!-- فورم تثبيت الحجز واختيار الخدمات والوقت -->
    <div class="booking-form">
        
        <div class="input-group">
            <label for="username">اسم الزبون الكريم:</label>
            <input type="text" id="username" placeholder="اكتب اسمك هنا" required>
        </div>

        <!-- قسم اختيار الحلاق المفضل -->
        <div class="input-group">
            <label for="barber">اختر الحلاق المفضل:</label>
            <select id="barber">
                <option value="بشار">بشار</option>
                <option value="محمد ابو غياث">محمد ابو غياث</option>
                <option value="معاذ">معاذ</option>
                <option value="ابو علي محمد">ابو علي محمد</option>
                <option value="يزن">يزن</option>
            </select>
        </div>

        <!-- قسم الخدمات متعدد الاختيار كأصناف مستقلة تضغط عليها -->
        <div class="input-group">
            <h2 class="section-title">اختر الخدمات المطلوبة (صنف أو أكثر):</h2>
            <div class="services-list">
                
                <label class="service-checkbox">
                    <input type="checkbox" name="salon_service" value="قص شعر ملكي">
                    <div class="service-details">
                        <span class="service-name">قص شعر ملكي</span>
                        <span class="service-price">45,000 ل.س</span>
                    </div>
                </label>

                <label class="service-checkbox">
                    <input type="checkbox" name="salon_service" value="حلاقة ذقن احترافية">
                    <div class="service-details">
                        <span class="service-name">حلاقة ذقن احترافية</span>
                        <span class="service-price">30,000 ل.س</span>
                    </div>
                </label>

                <label class="service-checkbox">
                    <input type="checkbox" name="salon_service" value="تصفيف شعر وسشوار">
                    <div class="service-details">
                        <span class="service-name">تصفيف شعر وسشوار</span>
                        <span class="service-price">20,000 ل.س</span>
                    </div>
                </label>

                <label class="service-checkbox">
                    <input type="checkbox" name="salon_service" value="تنظيف بشرة كامل (ماسك)">
                    <div class="service-details">
                        <span class="service-name">تنظيف بشرة كامل (ماسك)</span>
                        <span class="service-price">35,000 ل.س</span>
                    </div>
                </label>

            </div>
        </div>

        <div class="input-group">
            <label for="time">الوقت المفضل للحضور:</label>
            <input type="time" id="time" required>
        </div>

        <button class="btn-submit" onclick="sendToWhatsApp()">تأكيد الحجز عبر الواتساب 💬</button>
    </div>
</div>

<script>
    function sendToWhatsApp() {
        // ضع رقم الواتساب الخاص بالصالون هنا بمفتاح سوريا وبدون أصفار
        const salonPhoneNumber = "963985207356";


        const name = document.getElementById('username').value;
        const barber = document.getElementById('barber').value;
        const time = document.getElementById('time').value;

        // تجميع الخدمات التي قام الزبون بتحديدها وضغط عليها
        const selectedServices = [];
        const checkboxes = document.querySelectorAll('input[name="salon_service"]:checked');
        
        checkboxes.forEach((checkbox) => {
            selectedServices.push(checkbox.value);
        });

        // التحقق من المدخلات
        if (!name) {
            alert('الرجاء كتابة اسمك أولاً يا ملك!');
            return;
        }
        if (selectedServices.length === 0) {
            alert('الرجاء تحديد صنف واحد على الأقل من قائمة الخدمات!');
            return;
        }
        if (!time) {
            alert('الرجاء تحديد وقت حضورك المفضل!');
            return;
        }

        // تحويل قائمة الخدمات المحددة لنص منسق تحت بعضه للواتساب
        const servicesText = selectedServices.map(s => `• ${s}`).join('%0A');

        // صياغة الرسالة النهائية
        const message = `مرحباً صالون الملك👑%0A` +
                        `أود حجز موعد بالتفاصيل التالية:%0A%0A` +
                        `👤 *اسم الزبون:* ${name}%0A` +
                        `✂️ *الحلاق المطلوب:* ${barber}%0A` +
                        `⏰ *الوقت المتوقع:* ${time}%0A%0A` +
                        `📌 *الخدمات المختارة:*%0A${servicesText}%0A%0A` +
                        `الرجاء تأكيد توافر الموعد!`;

        // فتح الواتساب تلقائياً بالرسالة
        window.location.href = `https://wa.me/${salonPhoneNumber}?text=${message}`;
    }
</script>

</body>
</html>
