<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صالون الملك - حجز مواعيد متكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #d4af37; /* ذهبي ملكي */
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #1e1e1e 0%, #111111 100%);
            border-bottom: 2px solid var(--accent-color);
        }

        .header .crown-icon {
            font-size: 40px;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-color);
        }

        .header p {
            color: var(--accent-color);
            font-size: 14px;
            margin-top: 5px;
            font-weight: 500;
        }

        .booking-form {
            padding: 20px;
        }

        .section-title {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 15px;
            border-right: 3px solid var(--accent-color);
            padding-right: 10px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group input[type="text"], 
        .input-group input[type="time"] {
            width: 100%;
            padding: 12px;
            background-color: #252525;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            text-align: right;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
        }

        /* شبكة كروت الحلاقين */
        .barber-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .barber-card {
            background: #252525;
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            border: 2px solid #2e2e2e;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .barber-card img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 8px;
            border: 2px solid #444;
            transition: border-color 0.2s;
        }

        .barber-card .barber-name {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
        }

        /* عند تحديد كرت الحلاق يضيء بالذهبي */
        .barber-card.selected {
            border-color: var(--accent-color);
            background-color: #2a2415;
        }

        .barber-card.selected img {
            border-color: var(--accent-color);
        }

        /* زر التفاصيل داخل كرت الحلاق */
        .btn-details {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            width: 80%;
            margin: auto;
        }

        .btn-details:hover {
            background: var(--accent-color);
            color: #121212;
        }

        /* قائمة الخدمات (مربعات اختيار متعدد) */
        .services-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .service-checkbox {
            display: flex;
            align-items: center;
            background-color: #252525;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #2e2e2e;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .service-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
            margin-left: 12px;
            cursor: pointer;
        }

        .service-details {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
        }

        .service-name {
            font-size: 15px;
            color: var(--text-color);
        }

        .service-price {
            color: var(--accent-color);
            font-weight: 700;
            font-size: 14px;
        }

        /* زر الحجز */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: #121212;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
            transition: transform 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* النافذة المنبثقة المنبثقة (المودال) تفاصيل الشغل والمعلومات */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            border: 1px solid #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .close-btn {
            position: absolute;
            top: 12px;
            right: 18px;
            cursor: pointer;
            font-size: 26px;
            color: #fff;
        }

        .work-gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .work-gallery img {
            width: 100%;
            height: 110px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="crown-icon">👑</div>
        <h1>صالون الملك</h1>
        <p>العناية الفاخرة التي تستحقها</p>
    </div>

    <div class="booking-form">
        
        <div class="input-group">
            <label for="username">اسم الزبون الكريم:</label>
            <input type="text" id="username" placeholder="اكتب اسمك هنا" required>
        </div>

        <div class="input-group">
            <h2 class="section-title">اختر الحلاق المفضل (اضغط على الكرت لتحديده):</h2>
            <div class="barber-grid" id="barbersList">
                </div>
        </div>

        <div class="input-group">
            <h2 class="section-title">اختر الخدمات المطلوبة (صنف أو أكثر):</h2>
            <div class="services-list">
                
                <label class="service-checkbox">
                    <input type="checkbox" name="salon_service" value="قص شعر ملكي">
                    <div class="service-details">
                        <span class="service-name">قص شعر ملكي</span>
                        <span class="service-price">45,000 ل.س</span>
                    </div>
                </label>

                <label class="service-checkbox">
                    <input type="checkbox" name="salon_service" value="حلاقة ذقن احترافية">
                    <div class="service-details">
                        <span class="service-name">حلاقة ذقن احترافية</span>
                        <span class="service-price">30,000 ل.س</span>
                    </div>
                </label>

                <label class="service-checkbox">
                    <input type="checkbox" name="salon_service" value="تصفيف شعر وسشوار">
                    <div class="service-details">
                        <span class="service-name">تصفيف شعر وسشوار</span>
                        <span class="service-price">20,000 ل.س</span>
                    </div>
                </label>

                <label class="service-checkbox">
                    <input type="checkbox" name="salon_service" value="تنظيف بشرة كامل (ماسك)">
                    <div class="service-details">
                        <span class="service-name">تنظيف بشرة كامل (ماسك)</span>
                        <span class="service-price">35,000 ل.س</span>
                    </div>
                </label>

            </div>
        </div>

        <div class="input-group">
            <label for="time">الوقت المفضل للحضور:</label>
            <input type="time" id="time" required>
        </div>

        <button class="btn-submit" onclick="sendToWhatsApp()">تأكيد الحجز عبر الواتساب 💬</button>
    </div>
</div>

<div class="modal" id="barberModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img id="modalImg" src="" style="width:90px; height:90px; border-radius:50%; border:2px solid var(--accent-color); object-fit: cover;">
        <h2 id="modalName" style="color: var(--accent-color); margin: 10px 0; font-size: 20px;"></h2>
        <p id="modalDesc" style="font-size: 14px; color: var(--text-muted); margin-bottom: 15px; line-height: 1.6;"></p>
        <h3 style="font-size: 14px; color: #fff; text-align: right; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;">📷 من أعماله الحالية:</h3>
        <div class="work-gallery" id="gallery"></div>
    </div>
</div>

<script>
    // قاعدة بيانات الحلاقين مع أسماء صورهم الحقيقية بدقة لغيت هاب
    const barbersData = {
        "بشار": { 
            img: "Bashr.jpg", 
            desc: "خبير القصات الملكية والتسريحات الحديثة، متميز بلمسته السريعة والمتقنة.", 
            work: ["bashar_work1.jpg", "bashar_work2.jpg"] 
        },
        "محمد ابو غياث": { 
            img: "mohammed_abu_ghiath.jpg", 
            desc: "أخصائي حلاقة وتحديد الذقن بالموس الاحترافي، وخبير العناية بالمظهر المتكامل للرجال.", 
            work: ["mohammed_work1.jpg", "mohammed_work2.jpg"] 
        },
        "معاذ": { 
            img: "moaz.jpg", 
            desc: "مبدع في تصفيف الشعر الحديث وقصات الكيرلي والستايلات العصرية التي تناسب الشباب.", 
            work: ["moaz_work1.jpg", "moaz_work2.jpg"] 
        },
        "ابو علي محمد": { 
            img: "abu_ali_mohammed.jpg", 
            desc: "صاحب الخبرة الطويلة واللمسة العريقة في القصات الفخمة الكلاسيكية واستشارات العناية بالبشرة.", 
            work: ["abuali_work1.jpg", "abuali_work2.jpg"] 
        },
        "يزن": { 
            img: "yazan.jpg", 
            desc: "أخصائي قصات الـ Fade الحديثة والتحديد المتقن، ومبدع في ماسكات تنظيف البشرة المتطورة.", 
            work: ["yazan_work1.jpg", "yazan_work2.jpg"] 
        }
    };

    let selectedBarber = ""; // لتخزين اسم الحلاق المختار للحجز

    // توليد كروت الحلاقين تلقائياً بالواجهة
    const gridContainer = document.getElementById('barbersList');
    Object.keys(barbersData).forEach(name => {
        const barber = barbersData[name];
        gridContainer.innerHTML += `
            <div class="barber-card" id="card-${name}" onclick="selectBarber('${name}')">
                <img src="${barber.img}" alt="${name}">
                <div class="barber-name">${name}</div>
                <button class="btn-details" onclick="showDetails(event, '${name}')">تفاصيل</button>
            </div>
        `;
    });

    // وظيفة تحديد الحلاق عند النقر على الكرت
    function selectBarber(name) {
        selectedBarber = name;
        Object.keys(barbersData).forEach(bName => {
            document.getElementById(`card-${bName}`).classList.remove('selected');
        });
        document.getElementById(`card-${name}`).classList.add('selected');
    }

    // وظيفة فتح نافذة التفاصيل والأعمال
    function showDetails(event, name) {
        event.stopPropagation(); // منع تحديد الحلاق عشوائياً عند الضغط على زر تفاصيل فقط
        const b = barbersData[name];
        document.getElementById('modalName').innerText = name;
        document.getElementById('modalImg').src = b.img;
        document.getElementById('modalDesc').innerText = b.desc;
        
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = b.work.map(img => `<img src="${img}" alt="شغل ${name}">`).join('');
        
        document.getElementById('barberModal').style.display = 'flex';
    }

    // إغلاق نافذة التفاصيل
    function closeModal() { 
        document.getElementById('barberModal').style.display = 'none'; 
    }

    // إغلاق عند النقر خارج محتوى النافذة
    window.onclick = function(event) {
        const modal = document.getElementById('barberModal');
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }

    // إرسال الحجز للواتساب
    function sendToWhatsApp() {
        // رقم الواتساب الحقيقي والمسجل الخاص بك والذي فحصناه سابقاً
        const salonPhoneNumber = "963931781383"; 

        const name = document.getElementById('username').value;
        const time = document.getElementById('time').value;

        // تجميع الأصناف والخدمات المضغوطة
        const selectedServices = [];
        const checkboxes = document.querySelectorAll('input[name="salon_service"]:checked');
        checkboxes.forEach((checkbox) => {
            selectedServices.push(checkbox.value);
        });

        // التحقق من صحة المدخلات قبل التوجيه للواتساب
        if (!name) {
            alert('الرجاء كتابة اسمك الكريم أولاً يا ملك!');
            return;
        }
        if (!selectedBarber) {
            alert('الرجاء اختيار الحلاق بالضغط على كرت الحلاق المفضل أولاً!');
            return;
        }
        if (selectedServices.length === 0) {
            alert('الرجاء تحديد صنف أو خدمة واحدة على الأقل!');
            return;
        }
        if (!time) {
            alert('الرجاء تحديد وقت الحضور المفضل!');
            return;
        }

        const servicesText = selectedServices.map(s => `• ${s}`).join('%0A');

        // صياغة رسالة الواتساب المنسقة الفخمة
        const message = `مرحباً صالون الملك👑%0A` +
                        `أود حجز موعد حلاقة بالتفاصيل التالية:%0A%0A` +
                        `👤 *اسم الزبون:* ${name}%0A` +
                        `✂️ *الحلاق المختار:* ${selectedBarber}%0A` +
                        `⏰ *وقت الحضور المتوقع:* ${time}%0A%0A` +
                        `📌 *الخدمات المطلوبة:*%0A${servicesText}%0A%0A` +
                        `الرجاء تأكيد توافر الموعد!`;

        // التوجيه التلقائي للمحادثة
        window.location.href = `https://wa.me/${salonPhoneNumber}?text=${message}`;
    }
</script>

</body>
</html>
