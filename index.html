<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صالون الملك | أناقة الملوك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark-gray: #1a1a1a; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--black); color: var(--text); padding: 15px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }

        .app-container { width: 100%; max-width: 450px; background: var(--dark-gray); border: 2px solid var(--gold); border-radius: 20px; padding: 25px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }

        /* Barber Pole Fixed */
        .pole-container { width: 40px; height: 120px; border: 4px solid #333; border-radius: 10px; margin: 0 auto 20px; overflow: hidden; background: white; position: relative; }
        .pole-anim { height: 200%; width: 100%; background: repeating-linear-gradient(45deg, #ff0000, #ff0000 15px, #ffffff 15px, #ffffff 30px, #0000ff 30px, #0000ff 45px); animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: translateY(0); } to { transform: translateY(-60px); } }

        h1 { color: var(--gold); text-align: center; font-size: 26px; margin-bottom: 5px; }
        .tagline { color: #aaa; text-align: center; font-size: 14px; margin-bottom: 20px; font-style: italic; }

        .form-group { margin-bottom: 15px; }
        label { color: var(--gold); display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: white; border-radius: 8px; }

        .offer-box { border: 1px solid var(--gold); padding: 10px; border-radius: 10px; background: #2a220a; margin-bottom: 15px; text-align: center; font-size: 14px; }
        
        .barber-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .barber-card { background: #333; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .barber-card.selected { border-color: var(--gold); background: #444; color: var(--gold); }
        
        button { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; color: black; }
        
        .footer { margin-top: 25px; text-align: center; font-size: 12px; color: #888; border-top: 1px solid #333; padding-top: 15px; }
        .footer a { color: var(--gold); text-decoration: none; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="pole-container"><div class="pole-anim"></div></div>
    <h1>صالون الملك</h1>
    <p class="tagline">نخبة الحلاقة لرجال النخبة</p>

    <div class="form-group">
        <label>اسم الزبون:</label>
        <input type="text" id="name" placeholder="أدخل اسمك الكريم">
    </div>

    <div class="form-group">
        <label>اختر الحلاق:</label>
        <div class="barber-grid" id="barbers"></div>
    </div>

    <div class="offer-box">
        <input type="checkbox" id="offerCheck"> 
        <label style="display:inline; color:white;"> عرض محدود: قص + دقن + سشوار + شمع + تنظيف = 800 ل.س</label>
    </div>

    <div class="form-group">
        <label>خدمة البروتين (حسب طول الشعر):</label>
        <select id="protein">
            <option value="بدون">بدون</option>
            <option value="قصير (400 ل.س)">شعر قصير (400 ل.س)</option>
            <option value="متوسط (600 ل.س)">شعر متوسط (600 ل.س)</option>
            <option value="طويل (800 ل.س)">شعر طويل (800 ل.س)</option>
        </select>
    </div>

    <div class="form-group">
        <label>وقت الحضور:</label>
        <input type="time" id="time">
    </div>

    <button onclick="book()">تأكيد الحجز الملكي</button>

    <div class="footer">
        <p>📍 دمشق، ساحة المرجة، بناء رمسيس، طابق أول.</p>
        <p>مدخل الصالون: أول شارع رامي.</p>
        <p>جميع الحقوق محفوظة Best Of</p>
        <a href="https://bashar3baid-wq.github.io/Best.of/">زيارة موقعنا الإلكتروني</a>
    </div>
</div>

<script>
    const barbers = ["بشار", "محمد", "معاذ", "أبو علي"];
    let selectedBarber = "";

    const grid = document.getElementById('barbers');
    barbers.forEach(name => {
        grid.innerHTML += `<div class="barber-card" onclick="select('${name}')" id="card-${name}">${name}</div>`;
    });

    function select(name) {
        selectedBarber = name;
        document.querySelectorAll('.barber-card').forEach(el => el.classList.remove('selected'));
        document.getElementById(`card-${name}`).classList.add('selected');
    }

    function book() {
        const name = document.getElementById('name').value;
        const time = document.getElementById('time').value;
        const offer = document.getElementById('offerCheck').checked ? "العرض الملكي (800 ل.س)" : "خدمات عادية";
        const protein = document.getElementById('protein').value;

        if(!name || !selectedBarber || !time) { alert("يرجى تعبئة الاسم والحلاق والوقت!"); return; }

        let msg = `حجز جديد لصالح: ${name}%0Aالحلاق: ${selectedBarber}%0Aالوقت: ${time}%0Aالخدمات المختارة: ${offer}%0Aعلاج البروتين: ${protein}`;
        window.location.href = `https://wa.me/963988225900?text=${msg}`;
    }
</script>
</body>
</html>
