<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صالون الملك | نظام المواعيد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --royal-gold: #d4af37; --deep-black: #090a0f; --card-bg: #13151c; --card-border: rgba(255, 255, 255, 0.06); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--deep-black); color: #fff; padding: 20px; }
        .app-container { max-width: 460px; margin: auto; }
        .header-section { text-align: center; margin-bottom: 20px; color: var(--royal-gold); }
        
        /* البطاقات المعدلة */
        .barber-card { background: var(--card-bg); border: 1px solid var(--card-border); padding: 15px; border-radius: 16px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .barber-card.selected { border-color: var(--royal-gold); background: #1f1c13; }
        .barber-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .status-badge { font-size: 13px; font-weight: bold; margin-top: 5px; }
        .available { color: #2ecc71; }
        .busy { color: #ff4757; }
        
        input[type="text"], select { width: 100%; padding: 14px; background: #0d0f13; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 15px; }
        .btn-submit { width: 100%; padding: 16px; background: linear-gradient(90deg, #b8962d, var(--royal-gold)); border: none; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-section"><h1>صالون الملك</h1></div>

    <input type="text" id="customerName" placeholder="أدخل اسمك الكريم">

    <div id="barbers-list">
        </div>

    <button class="btn-submit" onclick="submitBooking()">تأكيد الحجز الملكي 👑</button>
</div>

<script>
    // 1. تعريف الحلاقين
    let barbers = [
        { id: 'bashar', name: 'بشار', img: 'Bashr.jpg', availableAt: 0 },
        { id: 'mohammed', name: 'محمد أبو غياث', img: 'mohammed_abu_ghiath.jpg', availableAt: 0 },
        { id: 'moaz', name: 'معاذ', img: 'moaz.jpg', availableAt: 0 }
    ];

    // استعادة البيانات المحفوظة سابقاً
    const savedData = JSON.parse(localStorage.getItem('salonBookings'));
    if(savedData) {
        barbers.forEach(b => { if(savedData[b.id]) b.availableAt = savedData[b.id]; });
    }

    let selectedBarberId = null;

    // 2. تحديث الشاشة
    function updateUI() {
        const container = document.getElementById('barbers-list');
        container.innerHTML = '';
        
        barbers.forEach(b => {
            const now = new Date().getTime();
            const timeLeft = b.availableAt - now;
            
            let statusHTML = '<span class="available">متوفر الآن</span>';
            if (timeLeft > 0) {
                const minutes = Math.ceil(timeLeft / 60000);
                statusHTML = `<span class="busy">مشغول، متاح بعد ${minutes} دقيقة</span>`;
            }

            const card = document.createElement('div');
            card.className = `barber-card ${selectedBarberId === b.id ? 'selected' : ''}`;
            card.innerHTML = `
                <img src="${b.img}" class="barber-img" onerror="this.src='https://via.placeholder.com/50'">
                <div>
                    <strong>${b.name}</strong>
                    <div class="status-badge">${statusHTML}</div>
                </div>
            `;
            card.onclick = () => { selectedBarberId = b.id; updateUI(); };
            container.appendChild(card);
        });
    }

    // 3. تأكيد الحجز
    function submitBooking() {
        const name = document.getElementById('customerName').value;
        if(!name) { alert("يرجى كتابة الاسم"); return; }
        if(!selectedBarberId) { alert("يرجى اختيار الحلاق"); return; }
        
        let b = barbers.find(x => x.id === selectedBarberId);
        const now = new Date().getTime();
        
        // المنطق: إذا كان محجوزاً، يبدأ من نهاية الوقت السابق، إذا لا يبدأ الآن.
        let startTime = Math.max(now, b.availableAt);
        b.availableAt = startTime + (40 * 60 * 1000); // إضافة 40 دقيقة

        // حفظ
        let saveObj = {};
        barbers.forEach(item => saveObj[item.id] = item.availableAt);
        localStorage.setItem('salonBookings', JSON.stringify(saveObj));
        
        // إرسال للواتساب
        const msg = `👑 حجز جديد باسم ${name} عند الحلاق ${b.name}`;
        window.location.href = `https://wa.me/963988225900?text=${msg}`;
        
        updateUI();
    }

    // تحديث العد التنازلي كل ثانية
    setInterval(updateUI, 1000);
    updateUI();
</script>
</body>
</html>
