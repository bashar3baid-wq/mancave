<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صالون الملك | فخامة تليق بك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-gold: #d4af37;
            --gold-glow: #f3e5ab;
            --deep-black: #090a0f;
            --card-bg: #13151c;
            --card-border: rgba(255, 255, 255, 0.06);
            --text-light: #f5f6f8;
            --text-muted: #9ca3af;
            --success-green: #2ecc71;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--deep-black); color: var(--text-light); padding: 25px 15px; min-height: 100vh; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(circle at top center, #161922 0%, var(--deep-black) 70%); }
        .app-container { width: 100%; max-width: 460px; background: rgba(19, 21, 28, 0.9); backdrop-filter: blur(10px); border-radius: 24px; padding: 28px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); }
        
        /* Elements Styling */
        .header-section { text-align: center; margin-bottom: 20px; }
        .header-section h1 { color: var(--royal-gold); font-size: 34px; font-weight: 900; margin-bottom: 4px; }
        .header-section .tagline { color: var(--text-muted); font-size: 13.5px; }
        
        .section-title { color: var(--royal-gold); font-size: 15px; font-weight: 700; margin-bottom: 14px; text-transform: uppercase; }
        .form-group { margin-bottom: 24px; }
        
        /* New Styles for Protein & Time */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .option-card { background: var(--card-bg); border: 1px solid var(--card-border); padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .option-card:hover { border-color: var(--royal-gold); }
        .option-card.active { border-color: var(--royal-gold); background: rgba(212, 175, 55, 0.1); }
        .option-text { font-size: 14px; }
        .option-price { color: var(--royal-gold); font-weight: 700; font-size: 13px; }
        
        /* Time Slots Grid */
        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .time-btn { background: var(--card-bg); border: 1px solid var(--card-border); color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 13px; transition: 0.3s; }
        .time-btn.active { background: var(--royal-gold); color: #000; font-weight: 700; }

        input[type="text"] { width: 100%; padding: 14px; background-color: #0d0f13; border: 1px solid var(--card-border); border-radius: 12px; color: #fff; font-size: 15px; text-align: right; }
        
        .btn-submit-royal { width: 100%; padding: 16px; background: linear-gradient(90deg, #b8962d, var(--royal-gold), #b8962d); color: #000; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        .royal-footer { margin-top: 35px; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 20px; text-align: center; font-size: 11px; color: #444; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-section">
        <h1>صالون الملك</h1>
        <div class="tagline">أصالة الضيافة وفخامة الأناقة الملكية</div>
    </div>

    <!-- الاسم -->
    <div class="form-group">
        <label class="section-title">اسم الزبون الكريم:</label>
        <input type="text" id="customerName" placeholder="أدخل اسمك هنا">
    </div>

    <!-- اختيار البروتين المطور -->
    <div class="form-group">
        <h3 class="section-title">جلسة معالجة البروتين:</h3>
        <div class="options-grid" id="proteinOptions">
            <div class="option-card" onclick="selectProtein(this, 'بدون بروتين')">
                <span class="option-text">لا أرغب بإضافة بروتين</span>
                <span class="option-price">0 ل.س</span>
            </div>
            <div class="option-card" onclick="selectProtein(this, 'بروتين شعر قصير (1000 ل.س)')">
                <span class="option-text">شعر قصير</span>
                <span class="option-price">1000 ل.س</span>
            </div>
            <div class="option-card" onclick="selectProtein(this, 'بروتين شعر متوسط (2000 ل.س)')">
                <span class="option-text">شعر متوسط</span>
                <span class="option-price">2000 ل.س</span>
            </div>
            <div class="option-card" onclick="selectProtein(this, 'بروتين شعر طويل (2500 ل.س)')">
                <span class="option-text">شعر طويل</span>
                <span class="option-price">2500 ل.س</span>
            </div>
        </div>
    </div>

    <!-- الوقت المطور -->
    <div class="form-group">
        <h3 class="section-title">تحديد وقت الحضور:</h3>
        <div class="time-grid" id="timeSlots">
            <div class="time-btn" onclick="selectTime(this, '10:00 ص')">10:00 ص</div>
            <div class="time-btn" onclick="selectTime(this, '12:00 م')">12:00 م</div>
            <div class="time-btn" onclick="selectTime(this, '02:00 م')">02:00 م</div>
            <div class="time-btn" onclick="selectTime(this, '04:00 م')">04:00 م</div>
            <div class="time-btn" onclick="selectTime(this, '06:00 م')">06:00 م</div>
            <div class="time-btn" onclick="selectTime(this, '08:00 م')">08:00 م</div>
        </div>
    </div>

    <button class="btn-submit-royal" onclick="submitBooking()">تأكيد الحجز الملكي 👑</button>

    <div class="royal-footer">
        &copy; 2026 صالون الملك. جميع الحقوق محفوظة.
    </div>
</div>

<script>
    let selectedProtein = "بدون بروتين";
    let selectedTime = "";

    function selectProtein(element, val) {
        document.querySelectorAll('#proteinOptions .option-card').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        selectedProtein = val;
    }

    function selectTime(element, val) {
        document.querySelectorAll('#timeSlots .time-btn').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        selectedTime = val;
    }

    function submitBooking() {
        const name = document.getElementById('customerName').value;
        if(!name) { alert("يرجى كتابة الاسم"); return; }
        if(!selectedTime) { alert("يرجى اختيار الوقت"); return; }

        const textMessage = `👑 *طلب حجز موعد جديد*%0A👤 *الاسم:* ${name}%0A🧪 *البروتين:* ${selectedProtein}%0A⏰ *الوقت:* ${selectedTime}`;
        window.location.href = `https://wa.me/963988225900?text=${textMessage}`;
    }
</script>
</body>
</html>
